<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/css.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Kaisei+Decol&family=Kalnia:wght@100..700&family=Kite+One&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/feather-icons"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      integrity="sha512-iecdLmaskl7CVJkEzyD6lkDNlzp6r3ztf27qi3RZtj3eUgNKLkOisRXQvok7YHBT2StwtduSQWKk8rJtfsuIeQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Film & Series</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        overflow-x: hidden;
      }

      body {
        padding-top: 120px !important;
      }

      .film-page-wrapper {
        display: flex;
        gap: 2rem;
        padding: 2rem;
        max-width: 100%;
        margin: 0 auto;
        min-height: auto;
      }

      .film-sidebar {
        position: sticky;
        top: 150px;
        height: fit-content;
        width: 280px;
        background: rgba(255, 0, 0, 0.1);
        border: 2px solid #ff0000;
        border-radius: 10px;
        padding: 0.4rem;
        flex-shrink: 0;
        z-index: 100;
      }

      .film-sidebar-title {
        font-family: "Kalnia", serif;
        font-size: 1.3rem;
        font-weight: bold;
        color: #ffffff;
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        cursor: pointer;
        user-select: none;
      }

      .film-sidebar-title::after {
        content: "▼";
        font-size: 0.8rem;
        color: #ff0000;
        transition: transform 0.3s ease;
      }

      .film-sidebar-title.collapsed::after {
        transform: rotate(-90deg);
      }

      .film-sidebar-menu {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        max-height: 500px;
        overflow: hidden;
        transition: max-height 0.3s ease;
      }

      .film-sidebar-menu.collapsed {
        max-height: 0;
      }

      .film-sidebar-menu a {
        color: #ffffff;
        padding: 0.75rem 1rem;
        border-left: 3px solid transparent;
        text-decoration: none;
        transition: all 0.3s ease;
        font-size: 1rem;
        cursor: pointer;
      }

      .film-sidebar-menu a:hover,
      .film-sidebar-menu a.active {
        color: #ff0000;
        border-left-color: #ff0000;
        background: rgba(255, 0, 0, 0.1);
      }

      .film-main {
        flex: 1;
        min-width: 0;
      }

      .film-section {
        margin-bottom: 4rem;
      }

      .film-section-title {
        font-family: "Kalnia", serif;
        font-size: 2rem;
        font-weight: bold;
        color: #ffffff;
        margin-bottom: 1rem;
        padding-bottom: 1rem;
        border-bottom: 2px solid #ff0000;
        padding-top: 70px;
      }

      .film-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 1.5rem;
        width: 100%;
      }

      .film-card {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        cursor: pointer;
        text-decoration: none;
        color: inherit;
        transition: all 0.3s ease;
      }

      .film-card:hover {
        transform: translateY(-8px);
      }

      .film-card-image {
        width: 100%;
        aspect-ratio: 3 / 4;
        overflow: hidden;
        border-radius: 12px;
        background: #2a2a2a;
        position: relative;
      }

      .film-card-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.3s ease;
      }

      .film-card:hover .film-card-image img {
        transform: scale(1.05);
      }

      .film-card-title {
        font-family: "Kalnia", serif;
        font-size: 0.95rem;
        font-weight: 600;
        color: #ffffff;
        text-align: center;
        line-height: 1.4;
      }

      .film-no-results {
        color: #aaa;
        text-align: center;
        padding: 2rem;
        grid-column: 1 / -1;
        font-size: 1.1rem;
      }

      @media (max-width: 1024px) {
        .film-page-wrapper {
          flex-direction: column;
          gap: 1.5rem;
        }

        .film-sidebar {
          position: static;
          width: 100%;
        }

        .film-grid {
          grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
          gap: 1.25rem;
        }
      }

      @media (max-width: 768px) {
        .film-page-wrapper {
          padding: 1.5rem 1rem;
        }

        .film-sidebar {
          width: 100%;
          border: 2px solid #ff0000;
        }

        .film-sidebar-menu.collapsed {
          max-height: 0;
        }

        .film-grid {
          grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
          gap: 1rem;
        }

        .film-section-title {
          font-size: 1.5rem;
          margin-bottom: 1.5rem;
        }

        .film-card-title {
          font-size: 0.85rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="film-page-wrapper">
      <!-- LEFT SIDEBAR (SEARCH + SIDEBAR) -->
      <div class="film-left-sidebar">
        <!-- SEARCH BAR -->
        <div class="film-search-container">
          <form class="film-search-form" id="filmSearchForm">
            <input
              type="search"
              class="film-search-input"
              id="filmSearchInput"
              placeholder="Cari film ..."
            />
            <i class="fas fa-search"></i>
          </form>
        </div>

        <!-- SIDEBAR -->
        <aside class="film-sidebar" id="filmSidebar">
          <div class="film-sidebar-title">Pilih Genre</div>
          <nav class="film-sidebar-menu" id="filmMenu">
            <a href="#" class="filter-btn active" data-filter="all">Film</a>
            <a href="#" class="filter-btn" data-filter="series">Series</a>
            <a href="#" class="filter-btn" data-filter="horor">Horor</a>
            <a href="#" class="filter-btn" data-filter="romansa">Romansa</a>
            <a href="#" class="filter-btn" data-filter="drama">Drama</a>
            <a href="#" class="filter-btn" data-filter="komedi">Komedi</a>
          </nav>
        </aside>
      </div>

      <!-- MAIN CONTENT -->
      <main class="film-main">
        <!-- WHAT'S NEW SECTION -->
        <section class="film-section" id="whatsNewSection">
          <h2 class="film-section-title">Hits New</h2>
          <div class="film-grid" id="whatsNewGrid">
            <div class="film-no-results">Loading films...</div>
          </div>
        </section>

        <!-- UP COMING SECTION -->
        <section class="film-section" id="upComingSection">
          <h2 class="film-section-title">Up Coming</h2>
          <div class="film-grid" id="upComingGrid">
            <div class="film-no-results">Loading films...</div>
          </div>
        </section>
      </main>
    </div>

    <script src="js/layout.js"></script>
    <script src="js/general.js"></script>
    <script src="js/data-film.js"></script>
    <script src="js/footer.js"></script>
    <script>
      let currentFilter = "all";

      function renderFilms() {
        const whatsNewFilms = filmCatalog.filter(
          (f) => f.section === "hits" && matchesFilter(f, currentFilter),
        );
        const upComingFilms = filmCatalog.filter(
          (f) => f.section === "upcoming" && matchesFilter(f, currentFilter),
        );

        renderSection("whatsNewGrid", whatsNewFilms);
        renderSection("upComingGrid", upComingFilms);

        // Hide sections if empty
        document.getElementById("whatsNewSection").style.display =
          whatsNewFilms.length > 0 ? "block" : "none";
        document.getElementById("upComingSection").style.display =
          upComingFilms.length > 0 ? "block" : "none";
      }

      function renderSection(gridId, films) {
        const grid = document.getElementById(gridId);
        if (films.length === 0) {
          grid.innerHTML =
            '<div class="film-no-results">No films found in this category</div>';
          return;
        }

        grid.innerHTML = films
          .map(
            (film) => `
          <a href="film-detail.html?slug=${film.slug}" class="film-card" data-slug="${film.slug}">
            <div class="film-card-image">
              <img src="${film.poster}" alt="${film.title}" loading="lazy"/>
            </div>
            <p class="film-card-title">${film.title}</p>
          </a>
        `,
          )
          .join("");
      }

      function matchesFilter(film, filter) {
        if (filter === "all") return true;
        return film.genres.some((g) => g.toLowerCase() === filter);
      }

      document.querySelectorAll(".filter-btn").forEach((btn) => {
        btn.addEventListener("click", (e) => {
          e.preventDefault();
          document
            .querySelectorAll(".filter-btn")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          currentFilter = btn.dataset.filter;
          renderFilms();
        });
      });

      // Toggle sidebar menu collapse/expand
      const sidebarTitle = document.querySelector(".film-sidebar-title");
      const sidebarMenu = document.querySelector(".film-sidebar-menu");

      if (sidebarTitle && sidebarMenu) {
        // Start collapsed
        sidebarTitle.classList.add("collapsed");
        sidebarMenu.classList.add("collapsed");

        sidebarTitle.addEventListener("click", () => {
          sidebarTitle.classList.toggle("collapsed");
          sidebarMenu.classList.toggle("collapsed");
        });
      }

      // Initial render
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", renderFilms);
      } else {
        renderFilms();
      }

      // Search functionality
      const searchForm = document.getElementById("filmSearchForm");
      const searchInput = document.getElementById("filmSearchInput");

      if (searchForm && searchInput) {
        searchForm.addEventListener("submit", (e) => {
          e.preventDefault();
          const query = searchInput.value.trim().toLowerCase();
          if (query) {
            const results = filmCatalog.filter((f) =>
              f.title.toLowerCase().includes(query),
            );
            if (results.length > 0) {
              // Navigate to first result
              window.location.href = `film-detail.html?slug=${results[0].slug}`;
            } else {
              alert("Film tidak ditemukan");
            }
          }
        });

        // Allow Enter key to submit
        searchInput.addEventListener("keypress", (e) => {
          if (e.key === "Enter") {
            searchForm.dispatchEvent(new Event("submit"));
          }
        });
      }
    </script>
  </body>
</html>
